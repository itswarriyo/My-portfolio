<!DOCTYPE html>

<link rel="stylesheet" href="fade.css">
<link rel="icon" href="Top logo.png" type="image/png">
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chart with Ai</title>
    <style>
        body,
        html {
            margin: 0%;
            padding: 0%;
            overflow: hidden;
            font-family: "Google Sans", sans-serif;

        }

        #AiChartMAin {
            background: linear-gradient(130deg, #ff0000, #1f7a3a, #2b2b2b);

            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 80px;
        }


        #AiChartMAin h1 {
            color: white;
            font-weight: bold;
            font-size: 50px;
            margin-top: 130px;
        }

        #AiChartMAin div {
            display: flex;
            width: 100%;
            gap: 7px;
            justify-content: center;
            align-items: center;
            margin-top: 230px;

        }

        #AiChartMAin div input {
            border: 2px solid transparent;
            outline: none;
            width: 40%;
            border-radius: 15px;
            padding: 10px 20px;
        }

        #AiChartMAin div span button {
            background-color: #2e2d2d;
            padding: 10px;
            border: none;
            font-size: large;
            color: white;
            border-radius: 15px;
        }

        #AiChartMAin div span button:hover {
            background-color: rgb(22, 22, 22);
        }


        #AiChartMAin div input:hover {
            border: 2px solid rgb(63, 61, 61);
            box-shadow: rgba(116, 113, 113, 0.35) 0px 5px 15px;

        }

        /* o to home btn */

        #GoHome {
            position: absolute;
            top: 10px;
            left: 10px;
            border: none;
            background-color: #2e2d2d;
            border-radius: 15px;
            padding: 12px 24px;


        }



        #GoHome:hover {
            background-color: #424141;
        }

        #GoHome a {
            color: white;
            text-decoration: none;
        }
    </style>
    <link
        href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Bungee+Tint&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Dancing+Script:wght@400..700&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+Chakma&family=Syncopate:wght@400;700&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">


</head>

<body>

    <button class="fade-sectionplz" id="GoHome"> <a href="index.html">Go to home </a> </button>

    <div id="AiChartMAin">
        <h1 class="fade-sectionplz">Ask with Meta</h1>
        <div>
            <input class="fade-sectionplz" type="text" id="inputAi" placeholder="Ask anything...">
            <span><button style="cursor: pointer;" class="fade-sectionplz" onclick="okbtn()" id="okBtn"><i
                        class="fa-solid fa-arrow-up "></i></button></span>

        </div>
    </div>
    <script src="script.js" defer></script>
    <script src="scriptfade.js"></script>
</body>

</html>
