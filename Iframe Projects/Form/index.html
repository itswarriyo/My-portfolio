<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #ffae00;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::-webkit-scrollbar {
            width: 10px;
        }

        body::-webkit-scrollbar-thumb {
            background: rgb(255, 255, 255);
        }

        body::-webkit-scrollbar-track {
            background-color: #ffae00;
        }

        .form {
            max-width: 500px;
            padding: 25px;
            border-radius: 12px;
            margin: 100px auto;
            background-color: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-bottom: 8px;
            /* ✅ as you wanted */
            font-weight: 600;
            color: #333;
        }

        .input {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        .input:focus {
            border-color: #4f46e5;
        }

        select.input {
            background-color: #ffffff;
        }

        .submit {
            width: 100%;
            padding: 12px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        .submit:hover {
            background-color: #2b265f;
        }
    </style>
</head>

<body>
    <form target="_blank" class="form" action="https://w3schools.com/action_page.php" method="get">

        <label for="email">Enter Email</label>
        <input class="input" type="email" id="email" name="email" required>

        <label for="name">Enter Name</label>
        <input class="input" type="text" id="name" name="name" required>

        <label for="profession">Select Profession</label>
        <select class="input" id="profession" name="profession" required>
            <option value="">Select</option>
            <option value="doctor">Doctor</option>
            <option value="civil">Civil Engineer</option>
            <option value="software">Software Engineer</option>
            <option value="business">Business</option>
        </select>

        <button class="submit" type="submit">Submit</button>

    </form>

</body>

</html>
