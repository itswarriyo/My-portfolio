<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigin up</title>
    <link rel="stylesheet" href="sigin.css">
    <link rel="icon" href="Top logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <link rel="stylesheet" href="fade.css">
</head>

<body>


    <main id="sigUpMain" style=" margin: 50px 0px 50px 0px;">
        <h1 class="fade-sectionplz">Create Account</h1>
        <p class="fade-sectionplz">Sigin up your account with free instant</p>
        <form method="post" id="myForm">

            <label class="fade-sectionplz" for="fName">Full Name</label>
            <input class="fade-sectionplz" autocomplete="on" type="text" id="fName" name="FullName"
                placeholder="Enter your name....">

            <label class="fade-sectionplz" for="upmail">Email * </label>
            <input class="fade-sectionplz" type="email" id="upmail" name="E-mail" placeholder="Enter your mail....">

            <div class="password-box fade-sectionplz">
                <input class="fade-sectionplz" type="password" id="password" name="password" autocomplete="off"
                    placeholder="Enter password">
                <span class="fade-sectionplz" id="eye" onclick="togglePassword()">👁️</span>
            </div>


            <div class="password-box fade-sectionplz">
                <input class="fade-sectionplz" type="password" id="passwords" name="password" autocomplete="off"
                    placeholder="Confirm password">
                <span class="fade-sectionplz" id="eyes" onclick="togglePasswords()">👁️</span>
            </div>


            <label>
                <input class="fade-sectionplz" type="checkbox" id="rememberMe">
                <b class="fade-sectionplz">Terms of Use</b> & <b>Privacy Policy</b>
            </label>

            <button style="cursor: pointer;" class="fade-sectionplz" onclick="verifyInputs()" id="siginUp">Sigin
                Up</button>
            <button style="cursor: pointer;" class="fade-sectionplz" type="reset">Reset</button>

            <p class="fade-sectionplz">Sigin with your social networks. 🌐</p>

            <div id="btnSection">
                <button class="fade-sectionplz"><a href="#"> <i class="fa-brands fa-google"></i> Continue With <br>
                        google</a></button>
                <button class="fade-sectionplz"><a href="#"><i class="fa-brands fa-facebook"></i> Continue With <br>
                        facebook</a></button>
            </div>



        </form>

        <p class="fade-sectionplz">AL-Ready have an account? <b><a href="sigin.html"
                    style="color: rgb(2, 148, 2); text-decoration: none;">Sigin in here</a> </b></p>
    </main>


    <script src="script.js"></script>
    <script src="scriptfade.js"></script>
</body>

</html>
